{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "opencode.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencode.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "opencode.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.ingressFrom }}
    - from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - port: 4096
          protocol: TCP
    {{- else }}
    # Empty ingressFrom + policyTypes:Ingress = default-deny ingress.
    {{- end }}
  egress:
    # DNS — required to resolve api.openai.com / api.anthropic.com.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS to provider APIs (anywhere — providers don't publish stable IP
    # ranges; egress is open to TCP/443 globally with RFC1918 excluded).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            {{- with .Values.networkPolicy.egressExcept }}
            except:
              {{- toYaml . | nindent 14 }}
            {{- end }}
      ports:
        - port: 443
          protocol: TCP
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
