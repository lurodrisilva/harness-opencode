apiVersion: v1
kind: Pod
metadata:
  name: {{ include "opencode.fullname" . }}-test-health
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencode.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ include "opencode.serviceAccountName" . }}
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      imagePullPolicy: IfNotPresent
      {{- if .Values.auth.enabled }}
      # opencode's HTTP basic auth covers every route, including
      # /global/health. The test pod must read the same credentials the
      # server uses, otherwise curl gets 401 and the test fails despite a
      # healthy server.
      env:
        - name: AUTH_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "opencode.authSecretName" . }}
              key: username
        - name: AUTH_PASS
          valueFrom:
            secretKeyRef:
              name: {{ include "opencode.authSecretName" . }}
              key: {{ .Values.auth.passwordKey }}
      {{- end }}
      command: ["sh", "-c"]
      args:
        - |
          set -eu
          {{- if .Values.auth.enabled }}
          AUTH="-u ${AUTH_USER}:${AUTH_PASS}"
          {{- else }}
          AUTH=""
          {{- end }}
          BODY="$(curl -fsS --max-time 5 $AUTH \
            "http://{{ include "opencode.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/global/health")"
          echo "body: $BODY"
          # Whitespace-tolerant — opencode currently emits compact JSON, but
          # a future formatter switch (e.g. `"healthy" : true`) shouldn't
          # silently break the test. Tests pod has no jq.
          echo "$BODY" | grep -Eq '"healthy"[[:space:]]*:[[:space:]]*true'
          echo "$BODY" | grep -Eq '"version"[[:space:]]*:[[:space:]]*"{{ .Chart.AppVersion }}"'
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 16Mi
