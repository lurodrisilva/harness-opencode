{{- /*
Auto-generated auth Secret with rotation safety.

Naive `randAlphaNum` would regenerate on every `helm upgrade`, breaking every
authenticated client. This template uses the `lookup`-then-fallback pattern:
on upgrade, read the existing Secret and reuse its password; only generate a
fresh password on first install (when `lookup` returns nil).

Limitations:
  - `lookup` returns nil during `--dry-run=client` (no API server contact).
    The render is correct on every real install/upgrade — the dry-run will
    show a different password each time, which is harmless (it never reaches
    the cluster).
*/ -}}
{{- if eq (include "opencode.authSecretRendered" .) "true" }}
{{- $name := printf "%s-auth" (include "opencode.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $password := "" }}
{{- if and $existing $existing.data (hasKey $existing.data .Values.auth.passwordKey) }}
{{- $password = index $existing.data .Values.auth.passwordKey | b64dec }}
{{- else }}
{{- $password = randAlphaNum (int .Values.auth.generatedPasswordLength) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencode.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.passwordKey }}: {{ $password | quote }}
  username: {{ .Values.auth.username | quote }}
{{- end }}
