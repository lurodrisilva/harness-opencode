{{- /*
Provider keys Secret. Skipped when:
  - `.Values.providers.existingSecret` is set (user brings their own), OR
  - both `openaiKey` and `anthropicKey` are empty (nothing to render).
*/ -}}
{{- if eq (include "opencode.providersSecretRendered" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-providers" (include "opencode.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencode.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.providers.openaiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.providers.anthropicKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
